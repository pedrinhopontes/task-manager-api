services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "TaskManager@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=TaskManagerDb;User Id=sa;Password=TaskManager@123;TrustServerCertificate=True"
    depends_on:
      - db